<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="Gr@diusWeb3 wordmark">
  <title>Gr@diusWeb3 — Play to Design Your AI Agent</title>
  <desc>Horizontal wordmark for headers and social cards. Pixel @ on the left, wordmark + tagline on the right. Colors match the site palette.</desc>

  <defs>
    <!-- Reuse the 13x13 pixel @ glyph from logo.svg -->
    <g id="pixel-at-wordmark" fill="#ffb84d">
      <rect x="3" y="0" width="7" height="1"/>
      <rect x="2" y="1" width="1" height="1"/><rect x="10" y="1" width="1" height="1"/>
      <rect x="1" y="2" width="1" height="1"/><rect x="11" y="2" width="1" height="1"/>
      <rect x="1" y="3" width="1" height="1"/><rect x="5" y="3" width="3" height="1"/><rect x="11" y="3" width="1" height="1"/>
      <rect x="1" y="4" width="1" height="1"/><rect x="4" y="4" width="1" height="1"/><rect x="8" y="4" width="1" height="1"/><rect x="11" y="4" width="1" height="1"/>
      <rect x="1" y="5" width="1" height="1"/><rect x="4" y="5" width="1" height="1"/><rect x="6" y="5" width="2" height="1"/><rect x="8" y="5" width="1" height="1"/><rect x="11" y="5" width="1" height="1"/>
      <rect x="1" y="6" width="1" height="1"/><rect x="4" y="6" width="1" height="1"/><rect x="8" y="6" width="1" height="1"/><rect x="11" y="6" width="1" height="1"/>
      <rect x="1" y="7" width="1" height="1"/><rect x="4" y="7" width="1" height="1"/><rect x="8" y="7" width="1" height="1"/><rect x="11" y="7" width="1" height="1"/>
      <rect x="1" y="8" width="1" height="1"/><rect x="5" y="8" width="3" height="1"/><rect x="8" y="8" width="1" height="1"/><rect x="11" y="8" width="1" height="1"/>
      <rect x="2" y="9" width="1" height="1"/><rect x="11" y="9" width="1" height="1"/>
      <rect x="2" y="10" width="1" height="1"/><rect x="11" y="10" width="1" height="1"/>
      <rect x="3" y="11" width="1" height="1"/><rect x="11" y="11" width="2" height="1"/>
      <rect x="4" y="12" width="9" height="1"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="720" height="200" fill="#05080c"/>

  <!-- NES frame -->
  <rect x="6" y="6" width="708" height="188" fill="none" stroke="#ffb84d" stroke-width="2"/>
  <rect x="12" y="12" width="696" height="176" fill="none" stroke="#1a2735" stroke-width="1"/>

  <!-- Corner reticles -->
  <g fill="#ffb84d">
    <rect x="14" y="14" width="6" height="1"/><rect x="14" y="14" width="1" height="6"/>
    <rect x="700" y="14" width="6" height="1"/><rect x="705" y="14" width="1" height="6"/>
    <rect x="14" y="185" width="6" height="1"/><rect x="14" y="180" width="1" height="6"/>
    <rect x="700" y="185" width="6" height="1"/><rect x="705" y="180" width="1" height="6"/>
  </g>

  <!-- Pixel @ glyph (13×13 cells × 9px = 117px tall, vertically centered around y=100) -->
  <use href="#pixel-at-wordmark" transform="translate(46 40) scale(9)"/>

  <!-- Wordmark + tagline on the right -->
  <g font-family='"JetBrains Mono","IBM Plex Mono",ui-monospace,Menlo,monospace' font-weight="700">
    <!-- GR@DIUS WEB3 -->
    <text x="216" y="92" font-size="56" letter-spacing="3" fill="#e6f1ff">GR@DIUS</text>
    <text x="216" y="142" font-size="56" letter-spacing="3" fill="#c8ff00">WEB3</text>
  </g>

  <!-- Tagline (smaller, mute) -->
  <g font-family='"JetBrains Mono",ui-monospace,Menlo,monospace' font-weight="400" letter-spacing="2">
    <text x="216" y="170" font-size="11" fill="#5a6c80">PLAY 60S · FORGE AN ON-CHAIN AGENT · TESTNET ONLY</text>
  </g>

  <!-- Right-edge sponsor strip (small, decorative) -->
  <g font-family='"JetBrains Mono",ui-monospace,Menlo,monospace' font-size="9" letter-spacing="2" fill="#5a6c80" text-anchor="end">
    <text x="694" y="38">0G · ENS · UNISWAP</text>
  </g>
</svg>
